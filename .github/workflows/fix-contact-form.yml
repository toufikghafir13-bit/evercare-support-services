name: Fix direct contact form delivery

on:
  push:
    paths:
      - .github/workflows/fix-contact-form.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-form:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Connect website form to direct email delivery
        shell: python
        run: |
          from pathlib import Path

          index = Path("index.html")
          html = index.read_text(encoding="utf-8")

          old_form = '<form onsubmit="handleSubmit(event)">'
          new_form = '''<form action="https://formsubmit.co/info@evercaresupport.ca" method="POST">
            <input type="hidden" name="_subject" value="New Evercare Support Services Request">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_next" value="https://evercaresupport.ca/thank-you.html">'''

          if old_form not in html:
              raise SystemExit("Expected contact form was not found; no changes made.")

          html = html.replace(old_form, new_form, 1)
          html = html.replace(
              '<input type="email" id="femail" name="email" placeholder="your@email.com">',
              '<input type="email" id="femail" name="email" placeholder="your@email.com" required>',
              1,
          )
          html = html.replace(
              '>Contact Us Today</button>',
              '>Send Request</button>',
              1,
          )
          index.write_text(html, encoding="utf-8")

          thanks = Path("thank-you.html")
          thanks.write_text('''<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1.0">
            <title>Thank You | Evercare Support Services</title>
            <meta name="robots" content="noindex">
            <style>
              *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#eaf4f6,#d4edf5);font-family:Arial,sans-serif;color:#143d3f}.card{width:min(620px,100%);background:#fff;border-radius:24px;padding:48px;text-align:center;box-shadow:0 20px 55px rgba(20,61,63,.14)}img{width:230px;max-width:80%;margin:0 auto 25px}h1{margin:0 0 14px;font-size:36px}p{margin:0 auto 28px;color:#4e6b6d;line-height:1.7;max-width:480px}.button{display:inline-block;background:#2a9d8f;color:#fff;text-decoration:none;font-weight:700;padding:13px 26px;border-radius:50px}@media(max-width:600px){.card{padding:34px 22px}h1{font-size:29px}}
            </style>
          </head>
          <body>
            <main class="card">
              <img src="logo.png" alt="Evercare Support Services">
              <h1>Thank you for contacting Evercare</h1>
              <p>Your support request has been sent directly to our team. We will review your information and respond as soon as possible.</p>
              <a class="button" href="/">Return to the website</a>
            </main>
          </body>
          </html>''', encoding="utf-8")

      - name: Commit the form fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html thank-you.html
          git diff --cached --quiet && exit 0
          git commit -m "Send website contact requests directly to Zoho email [skip ci]"
          git push
